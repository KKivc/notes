baseURL: https://nethub.20050305.xyz
locale: zh-CN
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false
title: NetHub
theme: hextra

enableGitInfo: true
pluralizeListTitles: false

params:
  description: Docker · Linux · Cloud Native · DevOps

  navbar:
    displayTitle: true
    logo:
      text: NetHub

  footer:
    displayCopyright: false
    displayPoweredBy: false
    enableFooterSwitches: false

  page:
    width: wide

menu:
  main:
    - name: 首页
      pageRef: /
      weight: 1
    - name: Linux
      pageRef: /linux
      weight: 10
    - name: Network
      pageRef: /networking
      weight: 20
    - name: Docker
      pageRef: /docker
      weight: 30
    - name: MySQL
      pageRef: /sql
      weight: 40
    - name: STM32
      pageRef: /stm32
      weight: 50
    - name: Git
      pageRef: /git
      weight: 55
    - name: GitHub
      url: https://github.com/KKivc/notes
      weight: 100

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      extras:
        mark:
          enable: true
  highlight:
    style: github
    lineNos: false
