<!-- 中文字体：标题 Noto Serif SC（衬线） · 正文 Noto Sans SC（无衬线） -->
<!-- 等宽：JetBrains Mono（代码块） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
<style>
mark { background-color: #fef08a; color: #1a1a2e; padding: 0.1em 0.3em; border-radius: 3px; }
.dark mark { background-color: #a16207; color: #fef9c3; }
</style>
<!-- 入场滚动动画：IntersectionObserver，零依赖 -->
<script>
(function(){if(window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;var o=new IntersectionObserver(function(e){e.forEach(function(e){if(e.isIntersecting){e.target.classList.add('av');o.unobserve(e.target)}})},{threshold:0.1,rootMargin:'0px 0px -40px 0px'});document.querySelectorAll('.nethub-hero,.stats-card,.hextra-card,.section-title,.content ul[style*="list-style: none"]').forEach(function(el){o.observe(el)})})();
</script>
