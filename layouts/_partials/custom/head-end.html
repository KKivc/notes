<!-- 中文字体：标题 Noto Serif SC（衬线） · 正文 Noto Sans SC（无衬线） -->
<!-- 等宽：JetBrains Mono（代码块） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
<style>
mark { background-color: #fef08a; color: #1a1a2e; padding: 0.1em 0.3em; border-radius: 3px; }
.dark mark { background-color: #a16207; color: #fef9c3; }
</style>
<!-- 入场动画：页面加载后 stagger 上浮 -->
<script>
(function(){if(window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
addEventListener('DOMContentLoaded',function(){
var el=document.querySelectorAll('.hextra-card,.stats-card,.section-title,.content ul[style*="list-style: none"],.nethub-hero');
el.forEach(function(e,i){setTimeout(function(){e.classList.add('av')},i*60)})})})();
</script>
